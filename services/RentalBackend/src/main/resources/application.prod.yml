spring:

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8080}

logging:
  level:
    root: WARN

app:

  frontend:
    customer-url: ${CUSTOMER_URL}

  admin:
    url: ${ADMIN_URL}

  email:
    enabled: true

  razorpay:
    key-id: ${RAZORPAY_KEY}
    key-secret: ${RAZORPAY_SECRET}

  security:
    login:
      max-attempts: 5
      lock-minutes: 15

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000