server:
    port: 8080
    servlet:
        context-path: /api/v1

spring:
    application:
        name: rental-backend

    profiles:
        active: dev

    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        open-in-view: false
        properties:
            hibernate:
                format_sql: true

    liquibase:
        enabled: true
        change-log: classpath:db/changelog/db.changelog-master.xml

springdoc:
    api-docs:
        path: /docs
    swagger-ui:
        path: /docs/swagger-ui.html

app:
    jwt:
        secret: ${JWT_SECRET:your-super-secret-key-which-should-be-at-least-256-bits-long}
        expiration-ms: 86400000
        refresh-expiration-ms: 604800000

logging:
    level:
        root: INFO
        org.springframework.security: INFO
