spring:
    datasource:
        url: jdbc:mysql://localhost:3306/staynest_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD}

    jpa:
        show-sql: true
        properties:
            hibernate:
                format_sql: true
    ai:                        
        openai:
            api-key: ${OPENAI_API_KEY}    
server:
    port: 8080

logging:
    level:
        root: INFO
        org.hibernate.SQL: DEBUG
        org.hibernate.type.descriptor.sql: TRACE

app:
    frontend:
        customer-url: http://localhost:5173

    admin:
        url: http://localhost:5174

    email:
        enabled: false

    razorpay:
        key-id: test_key
        key-secret: test_secret

    security:
        login:
            max-attempts: 5
            lock-minutes: 15
